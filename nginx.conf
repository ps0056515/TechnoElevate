# ─────────────────────────────────────────────────────────────────────────────
# Nginx Reverse-Proxy Config — TechnoElevate
#
# SETUP:
#   1. Install Nginx: sudo apt install nginx  (Ubuntu)
#   2. Copy this file: sudo cp nginx.conf /etc/nginx/sites-available/techno-elevate
#   3. Enable it:      sudo ln -s /etc/nginx/sites-available/techno-elevate /etc/nginx/sites-enabled/
#   4. Test config:    sudo nginx -t
#   5. Reload:         sudo nginx -s reload
#
# ROLE:
#   - Terminates HTTPS (SSL) and forwards traffic to PM2/Node.js on port 6000
#   - Serves Vite's dist/ static files directly (much faster than Node serving them)
#   - Handles WebSocket upgrade for Vite HMR (dev only)
#   - Applies gzip, caching headers, and connection limits
# ─────────────────────────────────────────────────────────────────────────────

upstream techno_backend {
    # PM2 runs 2+ Node processes all listening on port 6000.
    # Nginx distributes across them (round-robin by default).
    server 127.0.0.1:6000;
    keepalive 32;    # reuse connections — reduces TCP handshake overhead
}

# ─── Rate limiting zones (shared across all worker processes) ─────────────────
# 10 MB zone → ~160,000 tracked IPs; burst 50 requests allowed, then 10 req/s
limit_req_zone  $binary_remote_addr  zone=api:10m  rate=30r/s;
limit_conn_zone $binary_remote_addr  zone=conn:10m;

# ─── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    server_name your-domain.com;    # ← replace with your actual domain or IP
    return 301 https://$host$request_uri;
}

# ─── Main HTTPS server ────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name your-domain.com;    # ← replace with your actual domain or IP

    # ── SSL certificates (use Let's Encrypt / certbot) ──
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_vary on;

    # ── Connection limits ─────────────────────────────────────────────────────
    limit_conn conn 50;   # max 50 concurrent connections per IP

    # ── Static assets (Vite build output) ─────────────────────────────────────
    # Serve these directly from disk — no Node.js roundtrip
    root /path/to/TechnoElevate-git/frontend/dist;   # ← update this path
    index index.html;

    # Cache hashed assets forever (Vite adds content hash to filenames)
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── API proxy ─────────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=60 nodelay;

        proxy_pass         http://techno_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection      "";   # enables HTTP keepalives to upstream
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
        proxy_buffering       on;
        proxy_buffer_size     8k;
        proxy_buffers         16 8k;
    }

    # ── SPA fallback — all other routes serve index.html ──────────────────────
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"   always;
    add_header X-Content-Type-Options   "nosniff"      always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}
